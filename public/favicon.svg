<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Ocean circle -->
  <circle cx="32" cy="32" r="30" fill="#1a3a5c" stroke="#e67e22" stroke-width="3"/>
  <!-- Compass rose - cardinal points -->
  <polygon points="32,6 35,28 32,24 29,28" fill="#e67e22"/>
  <polygon points="32,58 35,36 32,40 29,36" fill="#f5e6d3" opacity="0.7"/>
  <polygon points="6,32 28,29 24,32 28,35" fill="#f5e6d3" opacity="0.7"/>
  <polygon points="58,32 36,29 40,32 36,35" fill="#f5e6d3" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#f5e6d3" stroke-width="1" opacity="0.4"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#e67e22"/>
  <!-- Outer tick marks -->
  <line x1="32" y1="4" x2="32" y2="8" stroke="#e67e22" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="32" y1="56" x2="32" y2="60" stroke="#f5e6d3" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="4" y1="32" x2="8" y2="32" stroke="#f5e6d3" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
  <line x1="56" y1="32" x2="60" y2="32" stroke="#f5e6d3" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
</svg>
